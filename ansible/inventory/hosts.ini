# =============================================================================
# Ansible Inventory - MediaWiki Infrastructure
# =============================================================================
# 
# Использование:
#   ansible all -m ping
#   ansible-playbook playbooks/nginx-lb.yml
#   ansible-playbook site.yml
#
# Требуется ~/.ssh/config с настройкой ProxyJump для всех хостов
# =============================================================================

[lb]
lb-01 ansible_host=yc-lb

[app]
app-01 ansible_host=yc-app-01
app-02 ansible_host=yc-app-02

[db]
db-01 ansible_host=yc-db-01 role=primary
db-02 ansible_host=yc-db-02 role=replica

[zabbix]
zabbix-01 ansible_host=yc-zabbix

[backup]
backup-01 ansible_host=yc-backup

# =============================================================================
# Группы для удобного выбора
# =============================================================================

[apps:children]
lb
app

[databases:children]
db

[monitoring:children]
zabbix

[infrastructure:children]
lb
app
db
zabbix
backup

# =============================================================================
# Общие переменные для всех хостов
# =============================================================================

[all:vars]
ansible_user=ubuntu
ansible_ssh_private_key_file=~/.ssh/yandex_cloud
ansible_python_interpreter=/usr/bin/python3
ansible_ssh_common_args=-o StrictHostKeyChecking=no
