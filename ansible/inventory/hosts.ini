# =============================================================================
# Ansible Inventory - MediaWiki Infrastructure
# =============================================================================
#
# Использование:
#   ansible all -m ping
#   ansible-playbook site.yml
#
# После terraform apply обновите LB_IP в этом файле.
# Внутренние серверы подключаются через ProxyJump на LB.
# =============================================================================

[lb]
lb-01 ansible_host=111.88.241.156

[app]
app-01 ansible_host=10.0.2.10
app-02 ansible_host=10.0.2.11

[db]
db-01 ansible_host=10.0.3.10 role=primary
db-02 ansible_host=10.0.3.11 role=replica

[zabbix]
zabbix-01 ansible_host=10.0.4.10

[backup]
backup-01 ansible_host=10.0.5.10

# =============================================================================
# Группы для удобного выбора
# =============================================================================

[apps:children]
lb
app

[databases:children]
db

[monitoring:children]
zabbix

[infrastructure:children]
lb
app
db
zabbix
backup

# =============================================================================
# Общие переменные для всех хостов
# =============================================================================

[all:vars]
ansible_user=ubuntu
ansible_ssh_private_key_file=~/.ssh/id_ed25519
ansible_python_interpreter=/usr/bin/python3
ansible_ssh_common_args=-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null

# LB подключается напрямую, остальные — через ProxyJump
[lb:vars]
ansible_ssh_common_args=-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null

[app:vars]
ansible_ssh_common_args=-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ProxyCommand="ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no -W %h:%p ubuntu@111.88.241.156"

[db:vars]
ansible_ssh_common_args=-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ProxyCommand="ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no -W %h:%p ubuntu@111.88.241.156"

[zabbix:vars]
ansible_ssh_common_args=-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ProxyCommand="ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no -W %h:%p ubuntu@111.88.241.156"

[backup:vars]
ansible_ssh_common_args=-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ProxyCommand="ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no -W %h:%p ubuntu@111.88.241.156"
